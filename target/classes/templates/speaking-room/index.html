<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Speaking Room — K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-speaking-room">
        <div class="page-header">
            <div>
                <h2 class="page-title">Speaking Room</h2>
                <p class="page-subtitle">Tham gia phòng nói theo thời gian thực</p>
            </div>
        </div>

        <div style="max-width: 900px;">
            <div class="section-title" style="margin-top: 0;">Phòng đang hoạt động</div>
            <div id="speaking-rooms-container">Đang tải...</div>

            <div id="current-room-view" style="margin-top: 24px; display:none;">
                <div class="section-title" style="margin-top: 0;">
                    Phòng #<span id="current-room-id"></span>
                </div>

                <div style="display:flex; gap: 12px; align-items:center; flex-wrap:wrap; margin-bottom: 16px;">
                    <button class="btn btn-secondary" id="leave-room-btn" type="button" onclick="leaveCurrentRoom()">Rời phòng</button>
                    <button class="btn btn-primary" id="mic-toggle-btn" type="button" onclick="toggleMic()">🎤 Mic: OFF</button>
                </div>

                <div class="section-title" style="margin-top: 0;">Người tham gia</div>
                <div id="participants-container" style="display:grid; gap: 10px;"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.4/lib/stomp.min.js"></script>
    <script th:inline="javascript" th:if="${user != null}">
        window.KLEARN_USER_ID = [[${user.userId}]];
    </script>
    <script th:src="@{/js/speaking-room.js}"></script>
</div>
</body>
</html>
