<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Luyện Nói — K-Learn</title></head>
<body>
<div layout:fragment="content">
<section class="page active" id="page-speaking">
    <div class="page-header">
        <div>
            <h2 class="page-title">Luyện Nói 말하기</h2>
            <p class="page-subtitle">Luyện phát âm tiếng Hàn</p>
        </div>
    </div>
    <div class="exercise-container">
        <div class="speaking-prompt">
            <p class="speaking-label">Hãy nói lại câu sau:</p>
            <div class="speaking-text-kr" id="speakingTextKr">안녕하세요</div>
            <div class="speaking-text-roman" id="speakingTextRoman">annyeonghaseyo</div>
            <div class="speaking-text-vi" id="speakingTextVi">Xin chào</div>
            <button class="btn-speak" onclick="speakKorean(document.getElementById('speakingTextKr').textContent)" aria-label="Nghe mẫu">🔊</button>
        </div>
        <div class="speaking-recorder">
            <button class="btn-record" id="recordBtn" onclick="toggleRecording()">
                <span class="record-icon" id="recordIcon">🎤</span>
                <span id="recordText">Nhấn để ghi âm</span>
            </button>
            <div class="recording-indicator" id="recordingIndicator" style="display:none;">
                <div class="pulse-dot"></div><span>Đang ghi âm...</span>
            </div>
            <div class="speaking-result" id="speakingResult" style="display:none;">
                <p class="speaking-result-label">Bạn đã nói:</p>
                <p class="speaking-result-text" id="speakingResultText"></p>
                <div class="speaking-score" id="speakingScore"></div>
            </div>
        </div>
        <div class="exercise-actions">
            <button class="btn btn-secondary" onclick="nextSpeakingPrompt()">Câu khác →</button>
        </div>
    </div>
</section>
</div>
</body>
</html>
