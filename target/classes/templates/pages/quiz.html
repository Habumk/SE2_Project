<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Kiểm tra — K-Learn</title></head>
<body>
<div layout:fragment="content">
<section class="page active" id="page-quiz">
    <div class="page-header">
        <div>
            <h2 class="page-title">Kiểm tra 시험</h2>
            <p class="page-subtitle">Đánh giá kiến thức tiếng Hàn của bạn</p>
        </div>
    </div>
    <div class="quiz-setup" id="quizSetup">
        <div class="quiz-type-grid">
            <button class="quiz-type-card" onclick="startQuiz('vocab')"><div class="qt-icon">📚</div><h4>Từ vựng</h4><p>Kiểm tra vốn từ</p></button>
            <button class="quiz-type-card" onclick="startQuiz('hangul')"><div class="qt-icon">🔤</div><h4>Hangul</h4><p>Nhận diện chữ cái</p></button>
            <button class="quiz-type-card" onclick="startQuiz('listening')"><div class="qt-icon">🎧</div><h4>Nghe</h4><p>Nghe và trả lời</p></button>
            <button class="quiz-type-card" onclick="startQuiz('grammar')"><div class="qt-icon">📝</div><h4>Ngữ pháp</h4><p>Điền vào chỗ trống</p></button>
            <button class="quiz-type-card" onclick="startQuiz('mixed')"><div class="qt-icon">🎯</div><h4>Tổng hợp</h4><p>Tất cả chủ đề</p></button>
        </div>
    </div>
    <div class="quiz-inprogress" id="quizInProgress" style="display:none;">
        <div class="quiz-header">
            <div class="quiz-progress-info">
                <span id="quizQuestionNum">Câu 1/10</span>
                <span class="quiz-score" id="quizScore">Điểm: 0</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="quizProgressBar" style="width:10%"></div></div>
        </div>
        <div class="quiz-question" id="quizQuestion">
            <div class="quiz-q-text" id="quizQText"></div>
            <div class="quiz-q-audio" id="quizQAudio" style="display:none;">
                <button class="btn-listen-big" onclick="playQuizAudio()">🔊</button>
            </div>
        </div>
        <div class="quiz-answers" id="quizAnswers"></div>
        <div class="exercise-result" id="quizResult" style="display:none;">
            <div class="result-icon" id="quizResultIcon"></div>
            <div class="result-text" id="quizResultText"></div>
        </div>
        <div class="exercise-actions">
            <button class="btn btn-primary" id="quizNextBtn" onclick="nextQuizQuestion()" style="display:none;">Câu tiếp →</button>
        </div>
    </div>
    <div class="quiz-summary" id="quizSummary" style="display:none;">
        <div class="quiz-summary-content">
            <div class="qs-icon" id="qsSummaryIcon">🎉</div>
            <h3 id="qsSummaryTitle">Tuyệt vời!</h3>
            <div class="qs-score-circle">
                <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" stroke="#e2e8f0" stroke-width="8" fill="none"/>
                    <circle cx="60" cy="60" r="54" stroke="url(#scoreGradient)" stroke-width="8" fill="none" stroke-dasharray="339.292" stroke-dashoffset="339.292" stroke-linecap="round" id="scoreCircle" transform="rotate(-90 60 60)"/>
                    <defs><linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
                </svg>
                <div class="qs-score-text" id="qsScoreText">0%</div>
            </div>
            <p class="qs-detail" id="qsDetail">0/10 câu đúng</p>
            <div class="qs-actions">
                <button class="btn btn-primary" onclick="restartQuiz()">Làm lại</button>
                <button class="btn btn-secondary" onclick="backToQuizSetup()">Chọn bài khác</button>
            </div>
        </div>
    </div>
</section>
</div>
</body>
</html>
