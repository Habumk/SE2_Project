<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Ngữ pháp — K-Learn</title></head>
<body>
<div layout:fragment="content">
<section class="page active" id="page-grammar">
    <div class="page-header">
        <div>
            <h2 class="page-title">Ngữ pháp 문법</h2>
            <p class="page-subtitle">Học ngữ pháp tiếng Hàn từ cơ bản đến nâng cao</p>
        </div>
    </div>
    <div class="grammar-list" id="grammarList"></div>
    <div class="modal-overlay" id="grammarModal" style="display:none;">
        <div class="modal-content">
            <button class="close-btn" onclick="closeGrammarModal()" aria-label="Đóng">&times;</button>
            <div id="grammarModalBody"></div>
        </div>
    </div>
</section>
</div>
</body>
</html>
