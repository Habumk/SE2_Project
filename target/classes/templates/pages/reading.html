<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Luyện Đọc — K-Learn</title></head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
<section class="page active" id="page-reading">
    <div class="page-header">
        <div>
            <h2 class="page-title">Luyện Đọc 읽기</h2>
            <p class="page-subtitle">Đọc hiểu đoạn văn tiếng Hàn</p>
        </div>
    </div>
    <div class="exercise-container">
        <div class="reading-passage">
            <div class="reading-level" id="readingLevel">Cấp độ: Sơ cấp</div>
            <div class="reading-text-kr" id="readingTextKr"></div>
            <button class="btn btn-sm btn-secondary" id="readingToggleTranslation" onclick="toggleReadingTranslation()">👁️ Hiện bản dịch</button>
            <div class="reading-text-vi" id="readingTextVi" style="display:none;"></div>
        </div>
        <div class="reading-questions" id="readingQuestions"></div>
        <div class="exercise-actions">
            <button class="btn btn-primary" id="readingCheckBtn" onclick="checkReadingAnswers()">Kiểm tra</button>
            <button class="btn btn-secondary" id="readingNextBtn" onclick="nextReadingPassage()" style="display:none;">Bài tiếp →</button>
        </div>
    </div>
</section>
</div>
</body>
</html>
