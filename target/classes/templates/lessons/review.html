<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title + ' - Review'}">Lesson Review</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-lesson-review">
        <div class="page-header">
            <div>
                <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
                <p class="page-subtitle">Ôn tập đáp án sai</p>
            </div>
        </div>

        <section>
            <h2 class="section-title" style="margin-top:0;">Wrong Answer Review</h2>
            <p>Trong giai đoạn này, dữ liệu sai sẽ được tải từ API theo spec.</p>
        </section>

        <section>
            <h2 class="section-title">Sai cần xem lại</h2>
            <div id="wrong-answers-container">Đang tải...</div>
        </section>

        <script th:inline="javascript">
            (async function loadWrongAnswers() {
                const lessonId = [[${lesson.lessonId}]];
                const container = document.getElementById('wrong-answers-container');
                try {
                    const res = await fetch(`/api/lessons/${lessonId}/wrong-answers`);
                    if (!res.ok) throw new Error('Failed to fetch wrong answers');
                    const payload = await res.json();
                    const items = payload?.data || [];

                    // Group by exercise type
                    const byType = items.reduce((acc, it) => {
                        const t = it.exerciseType || 'unknown';
                        if (!acc[t]) acc[t] = [];
                        acc[t].push(it);
                        return acc;
                    }, {});

                    container.innerHTML = Object.entries(byType).map(([type, list]) => `
                        <div style="margin-bottom:24px;">
                            <h3 style="margin:0 0 12px;">${type}</h3>
                            ${list.map(it => `
                                <div style="padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px;">
                                    <div style="font-weight:700;margin-bottom:8px;">${it.questionContent || ''}</div>

                                    ${type === 'speaking' ? `
                                        <div style="margin-bottom:8px;color:#374151;">
                                            <div><b>Expected:</b> ${it.expectedText || ''}</div>
                                            <div><b>You said:</b> ${it.sttResult || ''}</div>
                                            <div><b>Score:</b> ${it.pronunciationScore != null ? (it.pronunciationScore + '%') : '0%'}</div>
                                        </div>
                                    ` : `
                                        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
                                            <div style="color:#dc2626;font-weight:700;">❌ ${it.selectedAnswer || ''}</div>
                                            <div style="color:#16a34a;font-weight:700;">✅ ${it.correctAnswer || ''}</div>
                                        </div>
                                    `}

                                    ${it.explanation ? `<div style="color:#6b7280;font-size:14px;">${it.explanation}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `).join('');
                } catch (e) {
                    container.textContent = 'Không thể tải dữ liệu review.';
                    console.error(e);
                }
            })();
        </script>
    </section>
</div>
</body>
</html>
