<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.title + ' - Lessons'}">Lessons</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-course-lessons">
        <div class="page-header">
            <div>
                <h2 class="page-title" th:text="${course.title}">Course</h2>
                <p class="page-subtitle">Danh sách bài học</p>
            </div>
        </div>

        <div th:if="${lessons == null || #lists.isEmpty(lessons)}">
            <p>No lessons found.</p>
        </div>

        <div th:if="${lessons != null}">
            <div th:each="lesson : ${lessons}">
                <div class="progress-item" style="margin-bottom:12px;">
                    <div class="progress-item-header">
                        <span style="font-weight:800;">
                            <span th:text="${lesson.orderIndex}">1</span>. <span th:text="${lesson.title}">Lesson title</span>
                        </span>
                        <span style="color:var(--text-secondary); font-size:13px;"
                              th:text="${statusByLessonId != null ? statusByLessonId.get(lesson.lessonId) : null}">not_started</span>
                    </div>
                    <div>
                        <a th:href="@{/lessons/{id}/player(id=${lesson.lessonId})}" style="color:var(--accent-primary); font-weight:700;">
                            Mở bài học
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
