<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title + ' - Player'}">Lesson Player</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ================= SKILL UI ================= */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .skill-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-surface, #f8fafc);
            border: 2px solid var(--border, #e2e8f0);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            transition: 0.2s;
        }

        .skill-card h3 {
            margin-top: 10px;
            font-size: 18px;
        }

        .skill-card p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue);
            background: #eff6ff;
        }

        .skill-card.listening { border-color: #3b82f6; }
        .skill-card.speaking  { border-color: #10b981; }
        .skill-card.reading   { border-color: #f59e0b; }
        .skill-card.writing   { border-color: #ef4444; }

        .review-box {
            margin-top: 30px;
            text-align: center;
        }

        .review-btn {
            display: inline-block;
            padding: 16px 40px;
            background: var(--green, #10b981);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.2s;
        }

        .review-btn:hover {
            background: #059669;
        }

        /* ================= THEORY CONTENT OPTIMIZATION ================= */
        .theory-content {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            line-height: 1.8;
            font-size: 16px;
            color: #334155;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Định dạng các thẻ do thư viện Marked tạo ra */
        .theory-content h3 {
            color: #2563eb;
            margin-top: 24px;
            margin-bottom: 12px;
            border-bottom: 2px solid #eff6ff;
            padding-bottom: 8px;
        }

        .theory-content strong {
            color: #be185d; /* Màu nhấn cho ngữ pháp/từ vựng */
            font-weight: 700;
        }

        .theory-content ul {
            padding-left: 20px;
            margin-bottom: 16px;
        }

        .theory-content li {
            margin-bottom: 8px;
        }

        .theory-content hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px dashed #e2e8f0;
        }

        .theory-content p {
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
<div layout:fragment="content">
    <section class="page active" id="page-lesson-player">

        <div class="page-header">
            <div>
                <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
                <p class="page-subtitle">Lý thuyết và luyện tập</p>
            </div>
        </div>

        <section style="margin-bottom: 40px;">
            <h2 class="section-title" style="margin-top:0;">Lý thuyết</h2>

            <div th:if="${theory != null}">
                <textarea id="markdown-raw" th:text="${theory.content}" style="display:none;"></textarea>

                <div id="theory-display" class="theory-content">
                    Đang tải nội dung...
                </div>
            </div>

            <div th:if="${theory == null}">
                <p style="color: var(--text-muted)">Chưa có nội dung lý thuyết.</p>
            </div>
        </section>

        <section class="lesson-exercise-section">
            <h2 class="section-title">Luyện tập</h2>

            <div class="skill-grid">
                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/listening'}" class="skill-card listening">
                    <span>🎧</span>
                    <h3>Listening</h3>
                    <p>Luyện kỹ năng nghe</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/speaking'}" class="skill-card speaking">
                    <span>🎤</span>
                    <h3>Speaking</h3>
                    <p>Luyện kỹ năng nói</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/reading'}" class="skill-card reading">
                    <span>📖</span>
                    <h3>Reading</h3>
                    <p>Luyện kỹ năng đọc</p>
                </a>

                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/writing'}" class="skill-card writing">
                    <span>✍️</span>
                    <h3>Writing</h3>
                    <p>Luyện kỹ năng viết</p>
                </a>
            </div>

            <div class="review-box">
                <a th:href="@{'/lessons/' + ${lesson.lessonId} + '/review'}" class="review-btn">
                    🔁 Review Lesson
                </a>
            </div>
        </section>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const rawEl = document.getElementById("markdown-raw");
            const displayEl = document.getElementById("theory-display");

            if (rawEl && displayEl) {
                try {
                    // Lấy nội dung thô từ textarea
                    const content = rawEl.value;

                    // Cấu hình marked
                    marked.setOptions({
                        breaks: true,
                        gfm: true,
                        headerIds: false,
                        mangle: false
                    });

                    // Chuyển đổi và gán vào thẻ display
                    displayEl.innerHTML = marked.parse(content);

                    console.log("Markdown rendered successfully!");
                } catch (error) {
                    console.error("Lỗi render Markdown:", error);
                    displayEl.innerHTML = rawEl.value; // Nếu lỗi thì hiện chữ thường để ko bị mất
                }
            }
        });
    </script>
</div>

</body>
</html>
