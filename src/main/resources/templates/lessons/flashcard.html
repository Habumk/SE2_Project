<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title + ' - Flashcards'}">Flashcards</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-lesson-flashcard">
        <div class="page-header">
            <div>
                <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
                <p class="page-subtitle">UC-14 Flashcard Mode</p>
            </div>
        </div>

        <h2 class="section-title" style="margin-top:0;">Flashcard Deck</h2>
        <div id="flashcard-root">
            <p>Loading vocabulary...</p>
        </div>

        <script th:inline="javascript">
            // UC-14: Vocabulary will be loaded via REST endpoint.
            (async function load() {
                const lessonId = [[${lesson.lessonId}]];
                const root = document.getElementById('flashcard-root');
                try {
                    const res = await fetch(`/api/lessons/${lessonId}/vocabulary`);
                    if (!res.ok) throw new Error('Failed to load vocabulary');
                    const words = await res.json();
                    root.innerHTML = '<p>Vocabulary loaded: ' + (words.length || 0) + ' words</p>';
                } catch (e) {
                    root.innerHTML = '<p>Could not load vocabulary.</p>';
                }
            })();
        </script>
    </section>
</div>
</body>
</html>
