<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${lesson.title + ' - Review'}">Lesson Review</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-lesson-review">
        <div class="page-header">
            <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
        </div>

        <section class="exercise-container" style="display:grid; gap:20px;">
            <div th:if="${lessonResult != null}" class="card" style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title">Ket qua lesson</h3>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <span class="status-badge status-completed">Tổng điểm: <span th:text="${lessonResult.totalScore}">0</span></span>
                    <span class="status-badge status-in-progress">XP: <span th:text="${lessonResult.xpEarned}">0</span></span>
                    <span class="status-badge status-not-started">Listening: <span th:text="${lessonResult.listeningScore}">0</span></span>
                    <span class="status-badge status-not-started">Reading: <span th:text="${lessonResult.readingScore}">0</span></span>
                    <span class="status-badge status-not-started">Speaking: <span th:text="${lessonResult.speakingScore}">0</span></span>
                    <span class="status-badge status-not-started">Writing: <span th:text="${lessonResult.writingScore}">0</span></span>
                </div>
            </div>

            <div th:if="${wrongAnswersByType == null || wrongAnswersByType.isEmpty()}" class="card"
                 style="padding:20px; border-radius:18px; background:#fff; color:#64748b;">
                Không có câu trả lời sai nào cần xem lại.
            </div>

            <div th:each="entry : ${wrongAnswersByType}" class="card"
                 style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title" th:text="${entry.key}">reading</h3>
                <div th:each="item : ${entry.value}" style="padding:16px 0; border-top:1px solid #e5e7eb;">
                    <div style="font-weight:700; margin-bottom:8px;" th:text="${item.questionContent}">Question</div>

                    <div th:if="${item.exerciseType == 'speaking'}" style="display:grid; gap:6px; color:#475569;">
                        <div>Expected: <span th:text="${item.expectedText}">expected</span></div>
                        <div>Bạn đã nói: <span th:text="${item.sttResult}">result</span></div>
                        <div>Điểm: <span th:text="${item.pronunciationScore}">0</span></div>
                    </div>

                    <div th:if="${item.exerciseType != 'speaking'}" style="display:grid; gap:6px; color:#475569;">
                        <div>Bạn chọn: <span th:text="${item.selectedAnswer}">selected</span></div>
                        <div>Đáp án đúng: <span th:text="${item.correctAnswer}">correct</span></div>
                    </div>

                    <div th:if="${item.explanation != null && !item.explanation.isBlank()}"
                         style="margin-top:8px; color:#64748b;" th:text="${item.explanation}">
                        explanation
                    </div>
                </div>
            </div>
        </section>
    </section>
</div>
</body>
</html>
