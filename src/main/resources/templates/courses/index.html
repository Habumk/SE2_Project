<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-courses">
        <div class="page-header">
            <div>
                <h2 class="page-title">📚 Giáo trình</h2>
                <p class="page-subtitle">Chọn course để xem các bài học bên trong</p>
            </div>
        </div>

        <div class="exercise-container">
            <ul style="list-style:none; padding:0; margin:0; display:grid; gap:12px;">
                <li th:each="course : ${courses}">
                    <a th:href="@{/courses/{id}/lessons(id=${course.courseId})}"
                       th:text="${course.title}"
                       style="text-decoration:none;">
                        <div class="quick-action-card" style="text-align:left;">
                            <div style="font-weight:800;">Course</div>
                        </div>
                    </a>
                </li>
            </ul>
        </div>
    </section>
</div>
</body>
</html>
