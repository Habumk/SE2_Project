<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Tu vung - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-vocabulary">
        <div class="page-header">
            <h2 class="page-title">Tu vung</h2>
            <p class="page-subtitle">Danh sach tu vung theo chu de duoc render bang Thymeleaf</p>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <section th:each="entry : ${vocabByCategory}" class="card"
                     style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title" th:text="${entry.key}">Category</h3>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;">
                    <article th:each="word : ${entry.value}" style="padding:16px; border:1px solid #e5e7eb; border-radius:16px;">
                        <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start;">
                            <div>
                                <div style="font-size:26px; font-weight:800;" th:text="${word.kr}">KR</div>
                                <div style="color:#2563eb; font-weight:600;" th:text="${word.roman}">roman</div>
                            </div>
                            <button type="button"
                                    th:attr="onclick=|speakKorean('${word.kr}')|"
                                    style="padding:8px 10px; border:none; border-radius:10px; background:#eff6ff; color:#2563eb; cursor:pointer;">
                                Speak
                            </button>
                        </div>
                        <div style="margin-top:10px; font-size:16px; color:#334155;" th:text="${word.vi}">Meaning</div>
                        <div th:if="${word.example != null && !word.example.isBlank()}"
                             style="margin-top:10px; color:#64748b; font-size:14px;" th:text="${word.example}">
                            Example
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </section>
</div>
</body>
</html>
