<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${lesson.title + ' - Listening'}">Listening - K-Learn</title>
</head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
    <section id="page-listening" class="page active" data-render-mode="server">
        <div class="page-header">
            <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <div th:if="${#lists.isEmpty(listeningExercises)}" class="card"
                 style="padding:24px; border-radius:20px; background:#fff; color:#64748b;">
                Chưa có bài nói cho bài học này.
            </div>

            <section th:each="exercise, exerciseStat : ${listeningExercises}"
                     class="card listening-card"
                     th:attr="data-listening-card=${exerciseStat.index}"
                     style="padding:24px; border-radius:20px; background:#fff; display:grid; gap:20px;">
                <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;">
                    <div>
                        <div class="status-badge status-in-progress">
                            Bai <span th:text="${exerciseStat.count}">1</span>/<span th:text="${#lists.size(listeningExercises)}">1</span>
                        </div>
                        <h3 style="margin:12px 0 6px;">Listening practice</h3>
                        <p style="margin:0; color:#64748b;">
                            Nghe câu mẫu và chọn đáp án đúng cho từng câu hỏi.
                        </p>
                    </div>
                    <button type="button"
                            class="btn btn-secondary"
                            th:attr="data-listening-audio=${exercise.audioUrl}">
                        Phát audio
                    </button>
                </div>

                <div th:if="${exercise.audioUrl != null && !exercise.audioUrl.isBlank()}"
                     style="padding:16px; border-radius:16px; background:#f8fafc; color:#475569;">
                    <strong style="display:block; margin-bottom:6px;">Nội dung audio</strong>
                    <span th:text="${exercise.audioUrl}">Audio text</span>
                </div>

                <div style="display:grid; gap:16px;">
                    <div th:each="question, questionStat : ${exercise.questions}"
                         class="card"
                         th:attr="data-question-index=${questionStat.index}"
                         style="padding:20px; border-radius:18px; background:#f8fafc;">
                        <div style="font-weight:700; margin-bottom:14px;">
                            Cau <span th:text="${questionStat.count}">1</span>:
                            <span th:text="${question.content}">Noi dung cau hoi</span>
                        </div>
                        <div style="display:grid; gap:10px;">
                            <button type="button"
                                    th:each="answer, answerStat : ${question.answers}"
                                    class="listening-option"
                                    th:attr="data-answer-index=${answerStat.index},
                                             data-correct=${answer.isCorrect}"
                                    style="text-align:left; padding:14px 16px; border:1px solid #dbe2ea; border-radius:14px; background:#fff;">
                                <span th:text="${answer.content}">Answer</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button type="button" class="btn btn-primary" data-check-listening>
                        Kiểm tra đáp án
                    </button>
                    <div data-listening-result
                         style="display:none; padding:12px 16px; border-radius:14px; background:#eff6ff; color:#1d4ed8; font-weight:700;">
                    </div>
                </div>
            </section>
        </div>
    </section>
</div>
<th:block layout:fragment="pageScripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('#page-listening .listening-option').forEach((option) => {
                option.addEventListener('click', () => {
                    const questionCard = option.closest('[data-question-index]');
                    questionCard.querySelectorAll('.listening-option').forEach((item) => {
                        item.classList.remove('selected');
                        item.style.borderColor = '#dbe2ea';
                        item.style.background = '#fff';
                    });

                    option.classList.add('selected');
                    option.style.borderColor = '#2563eb';
                    option.style.background = '#dbeafe';
                });
            });

            document.querySelectorAll('[data-listening-audio]').forEach((button) => {
                button.addEventListener('click', () => {
                    const text = button.dataset.listeningAudio;
                    if (text && window.speakKorean) {
                        window.speakKorean(text);
                    }
                });
            });

            document.querySelectorAll('[data-check-listening]').forEach((button) => {
                button.addEventListener('click', () => {
                    const card = button.closest('[data-listening-card]');
                    const questions = card.querySelectorAll('[data-question-index]');
                    let correctCount = 0;

                    questions.forEach((question) => {
                        const selected = question.querySelector('.listening-option.selected');
                        const options = question.querySelectorAll('.listening-option');
                        const correctOption = question.querySelector('.listening-option[data-correct="true"]');

                        options.forEach((option) => {
                            option.disabled = true;
                            option.style.cursor = 'default';
                            if (option.dataset.correct === 'true') {
                                option.style.borderColor = '#16a34a';
                                option.style.background = '#dcfce7';
                            }
                        });

                        if (selected && selected.dataset.correct === 'true') {
                            correctCount += 1;
                        } else if (selected) {
                            selected.style.borderColor = '#dc2626';
                            selected.style.background = '#fee2e2';
                        }

                        if (!selected && correctOption) {
                            correctOption.style.borderColor = '#16a34a';
                            correctOption.style.background = '#dcfce7';
                        }
                    });

                    const result = card.querySelector('[data-listening-result]');
                    result.style.display = 'block';
                    result.textContent = `Đúng ${correctCount}/${questions.length} câu.`;
                });
            });
        });
    </script>
</th:block>
</body>
</html>
