<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Bang xep hang - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-leaderboard">
        <div class="page-header">
            <h2 class="page-title">Bang xep hang</h2>
            <p class="page-subtitle">Du lieu duoc render truc tiep tu Spring MVC va Thymeleaf</p>
        </div>

        <div class="exercise-container">
            <div th:if="${entries == null || #lists.isEmpty(entries)}" style="color:#64748b;">
                Chua co du lieu bang xep hang.
            </div>

            <div th:if="${entries != null && !#lists.isEmpty(entries)}" style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                    <tr>
                        <th style="text-align:left; padding:12px;">Hang</th>
                        <th style="text-align:left; padding:12px;">Nguoi hoc</th>
                        <th style="text-align:left; padding:12px;">Cap do</th>
                        <th style="text-align:right; padding:12px;">Tong XP</th>
                        <th style="text-align:right; padding:12px;">Streak</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${entries}" style="border-top:1px solid #e5e7eb;">
                        <td style="padding:14px 12px;" th:text="${entry.rank}">1</td>
                        <td style="padding:14px 12px;" th:text="${entry.name}">Hoc vien</td>
                        <td style="padding:14px 12px;">LV. <span th:text="${entry.currentLevel}">1</span></td>
                        <td style="padding:14px 12px; text-align:right;" th:text="${entry.totalXp}">0</td>
                        <td style="padding:14px 12px; text-align:right;"> <span th:text="${entry.streakCount}">0</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
</body>
</html>
