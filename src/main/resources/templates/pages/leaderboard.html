<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Bảng xếp hạng — K-Learn</title></head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-leaderboard">
        <div class="page-header">
            <div>
                <h2 class="page-title">🏅 Bảng xếp hạng</h2>
                <p class="page-subtitle">Xếp hạng dựa trên tổng XP</p>
            </div>
        </div>

        <div class="exercise-container">
            <div class="section-title" style="margin-top:0;">Top học viên</div>
            <div id="leaderboardLoading" style="color:var(--text-secondary);">Đang tải...</div>
            <div id="leaderboardTable" style="display:none;">
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead>
                        <tr>
                            <th style="text-align:left; padding:10px; border-bottom:1px solid var(--border);">#</th>
                            <th style="text-align:left; padding:10px; border-bottom:1px solid var(--border);">Người học</th>
                            <th style="text-align:left; padding:10px; border-bottom:1px solid var(--border);">Cấp</th>
                            <th style="text-align:right; padding:10px; border-bottom:1px solid var(--border);">XP</th>
                            <th style="text-align:right; padding:10px; border-bottom:1px solid var(--border);">Streak</th>
                        </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        (async function loadLeaderboard() {
            const loadingEl = document.getElementById('leaderboardLoading');
            const tableEl = document.getElementById('leaderboardTable');
            try {
                const res = await fetch('/api/leaderboard');
                const payload = await res.json();
                const entries = payload && payload.data ? payload.data : [];

                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = entries.map((e, i) => `
                    <tr>
                        <td style="padding:10px; border-bottom:1px solid var(--border); font-weight:800;">${i + 1}</td>
                        <td style="padding:10px; border-bottom:1px solid var(--border); font-weight:600;">${e.name || ''}</td>
                        <td style="padding:10px; border-bottom:1px solid var(--border);">${e.currentLevel ?? 1}</td>
                        <td style="padding:10px; border-bottom:1px solid var(--border); text-align:right; font-weight:800;">${e.totalXp ?? 0}</td>
                        <td style="padding:10px; border-bottom:1px solid var(--border); text-align:right;">${e.streakCount ?? 0}</td>
                    </tr>
                `).join('');

                loadingEl.style.display = 'none';
                tableEl.style.display = 'block';
            } catch (e) {
                console.error(e);
                if (loadingEl) loadingEl.textContent = 'Không thể tải bảng xếp hạng.';
            }
        })();
    </script>
</div>
</body>
</html>
