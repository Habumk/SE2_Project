<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ho so - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section id="page-profile" class="page active">
        <div class="page-header">
            <h2 class="page-title">Hồ sơ của tôi</h2>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <section class="card" style="padding:24px; border-radius:20px; background:#fff;">
                <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
                    <div style="width:88px; height:88px; border-radius:24px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#2563eb,#7c3aed); color:#fff; font-size:36px; font-weight:800;"
                         th:text="${user != null ? user.name.substring(0,1).toUpperCase() : 'U'}">U</div>
                    <div style="display:grid; gap:8px;">
                        <h3 style="margin:0; font-size:28px;" th:text="${user != null ? user.name : 'Hoc vien'}">Hoc vien</h3>
                        <div style="color:#64748b;" th:text="${user != null ? user.email : 'email@example.com'}">email@example.com</div>
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <span class="status-badge status-in-progress">Cấp <span th:text="${user != null ? user.currentLevel : 1}">1</span></span>
                            <span class="status-badge status-completed"><span th:text="${user != null ? user.totalXp : 0}">0</span> XP</span>
                            <span class="status-badge status-not-started">Streak <span th:text="${user != null ? user.streakCount : 0}">0</span> ngày</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:24px; border-radius:20px; background:#fff;">
                <h3 class="section-title">Huy hiệu đã mở khóa</h3>
                <div th:if="${earnedBadges == null || #lists.isEmpty(earnedBadges)}" style="color:#64748b;">
                    Chua co huy hieu nao duoc mo khoa.
                </div>
                <div th:if="${earnedBadges != null && !#lists.isEmpty(earnedBadges)}"
                     style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px;">
                    <div th:each="badge : ${earnedBadges}"
                         style="padding:16px; border:1px solid #dbeafe; border-radius:16px; background:#f8fbff;">
                        <div style="font-size:28px; margin-bottom:10px;">T</div>
                        <div style="font-weight:700; margin-bottom:6px;" th:text="${badge.name}">Badge</div>
                        <div style="font-size:14px; color:#64748b;" th:text="${badge.description}">Description</div>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:24px; border-radius:20px; background:#fff;">
                <h3 class="section-title">Cài đặt tài khoản</h3>
                <div style="display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap;">
                    <label for="themeSelect" style="font-weight:700;">Chủ đề hiển thị</label>
                    <select id="themeSelect" onchange="updateTheme(this.value)" style="padding:10px 14px; border-radius:12px; border:1px solid #cbd5e1;">
                        <option value="light" th:selected="${user == null || user.theme == 'light'}">Chế độ sáng</option>
                        <option value="dark" th:selected="${user != null && user.theme == 'dark'}">Chế độ tối</option>
                    </select>
                </div>
            </section>
        </div>
    </section>
</div>
<th:block layout:fragment="pageScripts">
    <script>
        function updateTheme(theme) {
            if (window.toggleDarkMode) {
                const current = document.documentElement.getAttribute('data-theme') || 'light';
                if (current !== theme) {
                    window.toggleDarkMode();
                }
            }
        }
    </script>
</th:block>
</body>
</html>
