<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${lesson.title + ' - Reading'}">Reading - K-Learn</title>
</head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
    <section id="page-reading" class="page active" data-render-mode="server">
        <div class="page-header">
            <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
            <p class="page-subtitle">Reading passage va cau hoi duoc render tu server, khong fetch de dung DOM nua.</p>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <div th:if="${#lists.isEmpty(readingPassages)}" class="card"
                 style="padding:24px; border-radius:20px; background:#fff; color:#64748b;">
                Chưa có bài đọc cho bài học này.
            </div>

            <article th:each="passage, passageStat : ${readingPassages}"
                     class="card"
                     th:attr="data-reading-card=${passage.id}"
                     style="padding:24px; border-radius:20px; background:#fff; display:grid; gap:20px;">
                <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;">
                    <div>
                        <div class="status-badge status-not-started">
                            Passage <span th:text="${passageStat.count}">1</span>/<span th:text="${#lists.size(readingPassages)}">1</span>
                        </div>
                        <h3 style="margin:12px 0 6px;">Reading level <span th:text="${passage.level}">Beginner</span></h3>
                    </div>
                    <button type="button" class="btn btn-secondary" data-toggle-translation>
                        Hien ban dich
                    </button>
                </div>

                <div style="padding:20px; border-radius:18px; background:#fff7ed; border:1px solid #fed7aa;">
                    <div style="font-weight:700; margin-bottom:10px;">Doan van tieng Han</div>
                    <div style="white-space:pre-wrap; line-height:1.8;" th:text="${passage.text}">Passage text</div>
                </div>

                <div data-reading-translation
                     style="display:none; padding:20px; border-radius:18px; background:#f8fafc; border:1px solid #e2e8f0;">
                    <div style="font-weight:700; margin-bottom:10px;">Ban dich tieng Viet</div>
                    <div style="white-space:pre-wrap; line-height:1.7;" th:text="${passage.translation}">Translation</div>
                </div>

                <div style="display:grid; gap:16px;">
                    <div th:each="question, questionStat : ${readingQuestionsByPassage[passage.id]}"
                         class="card"
                         th:attr="data-reading-question=${questionStat.index}"
                         style="padding:20px; border-radius:18px; background:#f8fafc;">
                        <div style="font-weight:700; margin-bottom:14px;">
                            Cau <span th:text="${questionStat.count}">1</span>:
                            <span th:text="${question['q']}">Question</span>
                        </div>
                        <div style="display:grid; gap:10px;">
                            <button type="button"
                                    th:each="option, optionStat : ${question['options']}"
                                    class="reading-option"
                                    th:attr="data-option-index=${optionStat.index},
                                             data-correct=${question['answer'] == optionStat.index}"
                                    style="text-align:left; padding:14px 16px; border:1px solid #dbe2ea; border-radius:14px; background:#fff;">
                                <span th:text="${option}">Option</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button type="button" class="btn btn-primary" data-check-reading>
                        Kiem tra bai doc
                    </button>
                    <div data-reading-result
                         style="display:none; padding:12px 16px; border-radius:14px; background:#fffbeb; color:#b45309; font-weight:700;">
                    </div>
                </div>
            </article>
        </div>
    </section>
</div>
<th:block layout:fragment="pageScripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[data-toggle-translation]').forEach((button) => {
                button.addEventListener('click', () => {
                    const card = button.closest('[data-reading-card]');
                    const translation = card.querySelector('[data-reading-translation]');
                    const isHidden = translation.style.display === 'none';
                    translation.style.display = isHidden ? 'block' : 'none';
                    button.textContent = isHidden ? 'An ban dich' : 'Hien ban dich';
                });
            });

            document.querySelectorAll('#page-reading .reading-option').forEach((option) => {
                option.addEventListener('click', () => {
                    const question = option.closest('[data-reading-question]');
                    question.querySelectorAll('.reading-option').forEach((item) => {
                        item.classList.remove('selected');
                        item.style.borderColor = '#dbe2ea';
                        item.style.background = '#fff';
                    });
                    option.classList.add('selected');
                    option.style.borderColor = '#f59e0b';
                    option.style.background = '#fef3c7';
                });
            });

            document.querySelectorAll('[data-check-reading]').forEach((button) => {
                button.addEventListener('click', () => {
                    const card = button.closest('[data-reading-card]');
                    const questions = card.querySelectorAll('[data-reading-question]');
                    let correctCount = 0;

                    questions.forEach((question) => {
                        const selected = question.querySelector('.reading-option.selected');
                        question.querySelectorAll('.reading-option').forEach((option) => {
                            option.disabled = true;
                            option.style.cursor = 'default';
                            if (option.dataset.correct === 'true') {
                                option.style.borderColor = '#16a34a';
                                option.style.background = '#dcfce7';
                            }
                        });

                        if (selected && selected.dataset.correct === 'true') {
                            correctCount += 1;
                        } else if (selected) {
                            selected.style.borderColor = '#dc2626';
                            selected.style.background = '#fee2e2';
                        }
                    });

                    const result = card.querySelector('[data-reading-result]');
                    result.style.display = 'block';
                    result.textContent = `Dung ${correctCount}/${questions.length} cau hoi.`;
                });
            });
        });
    </script>
</th:block>
</body>
</html>
