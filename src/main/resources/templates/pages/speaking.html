<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${lesson.title + ' - Speaking'}">Speaking - K-Learn</title>
</head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
    <section id="page-speaking" class="page active" data-render-mode="server">
        <div class="page-header">
            <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
            <p class="page-subtitle">Speaking prompt da duoc render san, JS chi con xu ly phat am va ghi am.</p>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <div th:if="${#lists.isEmpty(speakingPrompts)}" class="card"
                 style="padding:24px; border-radius:20px; background:#fff; color:#64748b;">
                Chua co bai speaking cho lesson nay.
            </div>

            <section th:each="prompt, promptStat : ${speakingPrompts}"
                     class="card"
                     th:attr="data-speaking-card=${prompt.id}, data-target-text=${prompt.kr}"
                     style="padding:24px; border-radius:20px; background:#fff; display:grid; gap:18px;">
                <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;">
                    <div>
                        <div class="status-badge status-completed">
                            Prompt <span th:text="${promptStat.count}">1</span>/<span th:text="${#lists.size(speakingPrompts)}">1</span>
                        </div>
                        <h3 style="margin:12px 0 6px; font-size:28px;" th:text="${prompt.kr}">안녕하세요</h3>
                        <div style="color:#16a34a; font-weight:700;" th:text="${prompt.roman}">annyeonghaseyo</div>
                        <div style="color:#64748b; margin-top:6px;" th:text="${prompt.vi}">Xin chao</div>
                    </div>
                    <button type="button"
                            class="btn btn-secondary"
                            th:attr="data-speaking-audio=${prompt.kr}">
                        Nghe mau
                    </button>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
                    <button type="button" class="btn btn-primary" data-record-speaking-inline>
                        Bat dau ghi am
                    </button>
                    <div data-speaking-status style="color:#64748b;">Nhan nut de doc lai cau mau.</div>
                </div>

                <div style="display:grid; gap:10px;">
                    <label style="font-weight:700;">Van ban nhan dien</label>
                    <textarea rows="2" data-speaking-transcript
                              style="padding:14px 16px; border-radius:14px; border:1px solid #dbe2ea; resize:vertical;"></textarea>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button type="button" class="btn btn-secondary" data-check-speaking>
                        So sanh ket qua
                    </button>
                    <div data-speaking-result
                         style="display:none; padding:12px 16px; border-radius:14px; background:#ecfdf5; color:#166534; font-weight:700;">
                    </div>
                </div>
            </section>
        </div>
    </section>
</div>
<th:block layout:fragment="pageScripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('[data-speaking-audio]').forEach((button) => {
                button.addEventListener('click', () => {
                    if (window.speakKorean) {
                        window.speakKorean(button.dataset.speakingAudio);
                    }
                });
            });

            document.querySelectorAll('[data-record-speaking-inline]').forEach((button) => {
                let recognition = null;
                let recording = false;

                button.addEventListener('click', () => {
                    const card = button.closest('[data-speaking-card]');
                    const transcript = card.querySelector('[data-speaking-transcript]');
                    const status = card.querySelector('[data-speaking-status]');
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                    if (!SpeechRecognition) {
                        status.textContent = 'Trinh duyet hien tai khong ho tro speech recognition.';
                        status.style.color = '#dc2626';
                        return;
                    }

                    if (recording && recognition) {
                        recognition.stop();
                        return;
                    }

                    recognition = new SpeechRecognition();
                    recognition.lang = 'ko-KR';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;

                    recognition.onstart = () => {
                        recording = true;
                        button.textContent = 'Dung ghi am';
                        status.textContent = 'Dang ghi am...';
                        status.style.color = '#2563eb';
                    };

                    recognition.onresult = (event) => {
                        transcript.value = event.results[0][0].transcript || '';
                    };

                    recognition.onerror = () => {
                        recording = false;
                        button.textContent = 'Bat dau ghi am';
                        status.textContent = 'Khong nhan dien duoc giong noi. Thu lai.';
                        status.style.color = '#dc2626';
                    };

                    recognition.onend = () => {
                        recording = false;
                        button.textContent = 'Bat dau ghi am';
                        if (status.textContent === 'Dang ghi am...') {
                            status.textContent = 'Da xong. Ban co the so sanh ket qua.';
                            status.style.color = '#166534';
                        }
                    };

                    recognition.start();
                });
            });

            document.querySelectorAll('[data-check-speaking]').forEach((button) => {
                button.addEventListener('click', () => {
                    const card = button.closest('[data-speaking-card]');
                    const target = (card.dataset.targetText || '').replace(/\s+/g, '');
                    const actual = (card.querySelector('[data-speaking-transcript]').value || '').trim().replace(/\s+/g, '');
                    const result = card.querySelector('[data-speaking-result]');

                    if (!actual) {
                        result.style.display = 'block';
                        result.style.background = '#fee2e2';
                        result.style.color = '#991b1b';
                        result.textContent = 'Chua co noi dung ghi am de so sanh.';
                        return;
                    }

                    let matches = 0;
                    for (const char of actual) {
                        if (target.includes(char)) {
                            matches += 1;
                        }
                    }

                    const score = target.length === 0 ? 0 : Math.round((matches / target.length) * 100);
                    result.style.display = 'block';
                    result.style.background = score >= 70 ? '#ecfdf5' : '#fffbeb';
                    result.style.color = score >= 70 ? '#166534' : '#b45309';
                    result.textContent = `Do tuong dong uoc tinh: ${score}%`;
                });
            });
        });
    </script>
</th:block>
</body>
</html>
