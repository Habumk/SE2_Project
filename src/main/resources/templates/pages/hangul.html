<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Hangul - K-Learn</title>
</head>
<body>
<div layout:fragment="content">
    <section class="page active" id="page-hangul">
        <div class="page-header">
            <h2 class="page-title">Bang chu Hangul</h2>
            <p class="page-subtitle">Du lieu duoc render truc tiep bang Thymeleaf thay vi JS render toan bo</p>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <section class="card" style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title">Phu am</h3>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px;">
                    <div th:each="item : ${consonants}" style="padding:16px; border:1px solid #e5e7eb; border-radius:16px;">
                        <div style="font-size:34px; font-weight:800;" th:text="${item.charValue}">g</div>
                        <div style="font-weight:700; margin-top:8px;" th:text="${item.name}">name</div>
                        <div style="color:#2563eb;" th:text="${item.roman}">roman</div>
                        <div style="font-size:14px; color:#64748b; margin-top:8px;" th:text="${item.desc}">desc</div>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title">Nguyen am</h3>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px;">
                    <div th:each="item : ${vowels}" style="padding:16px; border:1px solid #e5e7eb; border-radius:16px;">
                        <div style="font-size:34px; font-weight:800;" th:text="${item.charValue}">a</div>
                        <div style="font-weight:700; margin-top:8px;" th:text="${item.name}">name</div>
                        <div style="color:#2563eb;" th:text="${item.roman}">roman</div>
                        <div style="font-size:14px; color:#64748b; margin-top:8px;" th:text="${item.desc}">desc</div>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title">Phu am doi</h3>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px;">
                    <div th:each="item : ${doubleConsonants}" style="padding:16px; border:1px solid #e5e7eb; border-radius:16px;">
                        <div style="font-size:34px; font-weight:800;" th:text="${item.charValue}">kk</div>
                        <div style="font-weight:700; margin-top:8px;" th:text="${item.name}">name</div>
                        <div style="color:#2563eb;" th:text="${item.roman}">roman</div>
                        <div style="font-size:14px; color:#64748b; margin-top:8px;" th:text="${item.desc}">desc</div>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:20px; border-radius:18px; background:#fff;">
                <h3 class="section-title">Nguyen am ghep</h3>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px;">
                    <div th:each="item : ${compoundVowels}" style="padding:16px; border:1px solid #e5e7eb; border-radius:16px;">
                        <div style="font-size:34px; font-weight:800;" th:text="${item.charValue}">wa</div>
                        <div style="font-weight:700; margin-top:8px;" th:text="${item.name}">name</div>
                        <div style="color:#2563eb;" th:text="${item.roman}">roman</div>
                        <div style="font-size:14px; color:#64748b; margin-top:8px;" th:text="${item.desc}">desc</div>
                    </div>
                </div>
            </section>
        </div>
    </section>
</div>
</body>
</html>
