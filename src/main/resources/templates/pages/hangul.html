<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Hangul — K-Learn</title></head>
<body>
<div layout:fragment="content">
<section class="page active" id="page-hangul">
    <div class="page-header">
        <div>
            <h2 class="page-title">Bảng chữ Hangul 한글</h2>
            <p class="page-subtitle">Học 40 ký tự cơ bản của bảng chữ cái tiếng Hàn</p>
        </div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="consonants" onclick="switchHangulTab('consonants')">Phụ âm (자음)</button>
        <button class="tab-btn" data-tab="vowels" onclick="switchHangulTab('vowels')">Nguyên âm (모음)</button>
        <button class="tab-btn" data-tab="double" onclick="switchHangulTab('double')">Phụ âm đôi (쌍자음)</button>
        <button class="tab-btn" data-tab="compound" onclick="switchHangulTab('compound')">Nguyên âm ghép</button>
    </div>
    <div class="hangul-grid" id="hangulGrid"></div>
    <div class="hangul-detail-card" id="hangulDetail" style="display:none;">
        <button class="close-btn" onclick="closeHangulDetail()" aria-label="Đóng">&times;</button>
        <div class="hangul-detail-char" id="hangulDetailChar">ㄱ</div>
        <div class="hangul-detail-name" id="hangulDetailName">기역 (giyeok)</div>
        <div class="hangul-detail-roman" id="hangulDetailRoman">g/k</div>
        <div class="hangul-detail-desc" id="hangulDetailDesc">Phát âm như "g" đứng đầu, "k" đứng cuối</div>
        <div class="hangul-detail-examples" id="hangulDetailExamples"></div>
        <button class="btn btn-primary btn-speak-large" onclick="speakKorean(document.getElementById('hangulDetailChar').textContent)">🔊 Nghe phát âm</button>
        <button class="btn btn-success" onclick="markHangulLearned()">✅ Đã học xong</button>
    </div>
</section>
</div>
</body>
</html>
