<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Luyện Viết — K-Learn</title></head>
<body>
<div layout:fragment="content">
<section class="page active" id="page-writing">
    <div class="page-header">
        <div>
            <h2 class="page-title">Luyện Viết 쓰기</h2>
            <p class="page-subtitle">Luyện viết chữ Hangul và dịch câu</p>
        </div>
    </div>
    <div class="writing-tabs">
        <button class="tab-btn active" onclick="switchWritingTab('draw')">✍️ Viết chữ</button>
        <button class="tab-btn" onclick="switchWritingTab('translate')">📝 Dịch câu</button>
    </div>
    <div class="writing-tab-content active" id="writingDrawTab">
        <div class="writing-prompt-card">
            <p>Hãy viết ký tự sau:</p>
            <div class="writing-target-char" id="writingTargetChar">가</div>
            <div class="writing-target-info" id="writingTargetInfo">ga</div>
            <button class="btn-speak" onclick="speakKorean(document.getElementById('writingTargetChar').textContent)">🔊</button>
        </div>
        <div class="canvas-container">
            <canvas id="writingCanvas" width="400" height="400"></canvas>
            <div class="canvas-actions">
                <button class="btn btn-sm btn-secondary" onclick="undoCanvas()">↩️ Hoàn tác</button>
                <button class="btn btn-sm btn-danger" onclick="clearCanvas()">🗑️ Xóa</button>
                <button class="btn btn-sm btn-primary" onclick="nextWritingChar()">Ký tự tiếp →</button>
            </div>
        </div>
    </div>
    <div class="writing-tab-content" id="writingTranslateTab" style="display:none;">
        <div class="translate-exercise" id="translateExercise">
            <div class="translate-prompt">
                <p class="translate-label">Dịch sang tiếng Hàn:</p>
                <p class="translate-source" id="translateSource">Xin chào</p>
            </div>
            <textarea class="translate-input" id="translateInput" placeholder="Nhập tiếng Hàn ở đây..." rows="3"></textarea>
            <div class="translate-result" id="translateResult" style="display:none;">
                <p><strong>Đáp án:</strong> <span id="translateAnswer"></span></p>
            </div>
            <div class="exercise-actions">
                <button class="btn btn-primary" onclick="checkTranslation()">Kiểm tra</button>
                <button class="btn btn-secondary" onclick="nextTranslation()">Câu khác →</button>
            </div>
        </div>
    </div>
</section>
</div>
</body>
</html>
