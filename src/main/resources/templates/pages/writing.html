<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${lesson.title + ' - Writing'}">Writing - K-Learn</title>
</head>
<body th:attr="data-lesson-id=${lesson.lessonId}">
<div layout:fragment="content">
    <section id="page-writing" class="page active" data-render-mode="server">
        <div class="page-header">
            <h2 class="page-title" th:text="${lesson.title}">Lesson</h2>
            <p class="page-subtitle">Writing duoc tach thanh 2 phan ro rang: viet ky tu va dich cau.</p>
        </div>

        <div class="exercise-container" style="display:grid; gap:24px;">
            <section class="card" style="padding:24px; border-radius:20px; background:#fff; display:grid; gap:20px;">
                <div style="display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap;">
                    <div>
                        <h3 class="section-title" style="margin:0;">Writing board</h3>
                        <p style="margin:8px 0 0; color:#64748b;">Chon ky tu ben duoi, nghe phat am va tap viet tren bang.</p>
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button type="button" class="btn btn-secondary" onclick="undoCanvas()">Undo</button>
                        <button type="button" class="btn btn-secondary" onclick="clearCanvas()">Clear</button>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:minmax(220px, 280px) minmax(0, 1fr); gap:24px; align-items:start;">
                    <div style="display:grid; gap:12px;">
                        <div id="writingActiveCard"
                             style="padding:20px; border-radius:18px; background:#f8fafc; border:1px solid #e2e8f0; text-align:center;">
                            <div id="writingTargetChar" style="font-size:64px; font-weight:800; margin-bottom:10px;">-</div>
                            <div id="writingTargetInfo" style="color:#ef4444; font-weight:700; margin-bottom:14px;">-</div>
                            <button type="button" class="btn btn-primary" id="writingSpeakBtn">Nghe mẫu</button>
                        </div>

                        <div th:if="${#lists.isEmpty(writingChars)}" style="color:#64748b;">
                            Chưa có bài viết.
                        </div>

                        <div th:unless="${#lists.isEmpty(writingChars)}" style="display:grid; gap:10px;">
                            <button type="button"
                                    th:each="item, itemStat : ${writingChars}"
                                    class="btn btn-secondary writing-char-btn"
                                    th:attr="data-hangul=${item.hangul}, data-roman=${item.roman}, data-active=${itemStat.index == 0}">
                                <span th:text="${item.hangul}">가</span>
                                <span th:if="${item.roman != null && !item.roman.isBlank()}"
                                      style="margin-left:8px; opacity:0.7;"
                                      th:text="${item.roman}">ga</span>
                            </button>
                        </div>
                    </div>

                    <div style="display:flex; justify-content:center;">
                        <canvas id="writingCanvas" width="420" height="420"
                                style="width:min(100%, 420px); aspect-ratio:1; border-radius:20px; border:1px solid #dbe2ea; background:#fff;"></canvas>
                    </div>
                </div>
            </section>

            <section class="card" style="padding:24px; border-radius:20px; background:#fff; display:grid; gap:18px;">
                <h3 class="section-title" style="margin:0;">Translate to Korean</h3>
                <div th:if="${#lists.isEmpty(writingTranslations)}" style="color:#64748b;">
                    Chua co bai dich cau.
                </div>

                <div th:each="item, itemStat : ${writingTranslations}"
                     class="card"
                     th:attr="data-writing-translation=${itemStat.index}"
                     style="padding:20px; border-radius:18px; background:#f8fafc; display:grid; gap:14px;">
                    <div>
                        <div style="font-size:13px; font-weight:700; color:#64748b; text-transform:uppercase;">Cau nguon</div>
                        <div style="font-size:20px; font-weight:700; margin-top:6px;" th:text="${item.vi}">Xin chao</div>
                    </div>

                    <textarea rows="3"
                              data-writing-input
                              style="padding:14px 16px; border-radius:14px; border:1px solid #dbe2ea; resize:vertical;"
                              placeholder="Nhap cau tieng Han cua ban..."></textarea>

                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <button type="button"
                                class="btn btn-primary"
                                th:attr="data-expected-kr=${item.kr}">
                            Kiem tra
                        </button>
                        <div data-writing-result
                             style="display:none; padding:12px 16px; border-radius:14px; background:#f8fafc; color:#334155;">
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </section>
</div>
<th:block layout:fragment="pageScripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const charButtons = Array.from(document.querySelectorAll('.writing-char-btn'));
            const targetChar = document.getElementById('writingTargetChar');
            const targetInfo = document.getElementById('writingTargetInfo');
            const speakBtn = document.getElementById('writingSpeakBtn');

            function setActiveChar(button) {
                charButtons.forEach((item) => {
                    item.style.borderColor = '#dbe2ea';
                    item.style.background = '#fff';
                });

                if (!button) {
                    targetChar.textContent = '-';
                    targetInfo.textContent = '-';
                    return;
                }

                button.style.borderColor = '#ef4444';
                button.style.background = '#fee2e2';
                targetChar.textContent = button.dataset.hangul || '-';
                targetInfo.textContent = button.dataset.roman || '';
                if (window.clearCanvas) {
                    window.clearCanvas();
                }
            }

            charButtons.forEach((button) => {
                button.addEventListener('click', () => setActiveChar(button));
            });

            if (charButtons.length > 0) {
                setActiveChar(charButtons[0]);
            }

            if (speakBtn) {
                speakBtn.addEventListener('click', () => {
                    if (window.speakKorean && targetChar.textContent && targetChar.textContent !== '-') {
                        window.speakKorean(targetChar.textContent);
                    }
                });
            }

            document.querySelectorAll('[data-expected-kr]').forEach((button) => {
                button.addEventListener('click', () => {
                    const card = button.closest('[data-writing-translation]');
                    const input = (card.querySelector('[data-writing-input]').value || '').trim();
                    const expected = button.dataset.expectedKr || '';
                    const result = card.querySelector('[data-writing-result]');

                    result.style.display = 'block';

                    if (!input) {
                        result.style.background = '#fee2e2';
                        result.style.color = '#991b1b';
                        result.textContent = `Dap an mau: ${expected}`;
                        return;
                    }

                    if (input === expected) {
                        result.style.background = '#dcfce7';
                        result.style.color = '#166534';
                        result.textContent = 'Chinh xac.';
                        return;
                    }

                    result.style.background = '#fffbeb';
                    result.style.color = '#b45309';
                    result.textContent = `Chưa đúng. Đáp án mẫu: ${expected}`;
                });
            });
        });
    </script>
</th:block>
</body>
</html>
