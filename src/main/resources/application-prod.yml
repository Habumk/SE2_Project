spring:
  thymeleaf:
    cache: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  datasource:
    hikari:
      maximum-pool-size: 20

logging:
  level:
    com.klearn: WARN
    org.springframework: ERROR
  file:
    name: /var/log/klearn/klearn.log

server:
  port: 443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
